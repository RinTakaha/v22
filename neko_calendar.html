<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>にゃんカレンダー</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a;
      min-height: 100vh;
      padding: 16px;
    }
    body.theme-white { background: #f5f0ea; }

    :root {
      --panel-bg: #111; --panel-border: #333; --panel-text: #eee; --panel-muted: #888;
      --accent: #eee; --chip-pending-bg: #222; --chip-pending-text: #ccc;
      --chip-done-bg: #1a3326; --chip-done-text: #6de0a0;
      --tag-bg: #222; --tag-text: #aaa; --btn-hover-bg: #eee; --btn-hover-text: #111;
      --today-bg: #eee; --today-text: #111; --sel-border: #eee;
      --prog-bg: #333; --prog-fill: #eee;
      --item-border: #333; --item-bg: #1a1a1a; --item-checked-bg: #222;
      --input-border: #333; --input-focus: #eee; --input-bg: #1a1a1a;
      --no-date-text: #666; --card-bg: #161616; --card-border: #333;
      --reset-btn: #888; --day-bg: #1a1a1a; --day-hover: #252525;
      --save-btn-bg: #eee; --save-btn-text: #111;
      --toggle-on: #eee; --toggle-off: #444; --toggle-knob: #111;
    }
    .theme-white {
      --panel-bg: #fffdf9; --panel-border: #e0d8d0; --panel-text: #3a3028; --panel-muted: #8a7a6a;
      --accent: #8a7a6a; --chip-pending-bg: #f5efe8; --chip-pending-text: #5a4030;
      --chip-done-bg: #e4f2e8; --chip-done-text: #1a5c32;
      --tag-bg: #f5efe8; --tag-text: #5a4030; --btn-hover-bg: #3a3028; --btn-hover-text: #fff;
      --today-bg: #8a7a6a; --today-text: #fff; --sel-border: #8a7a6a;
      --prog-bg: #e8ddd4; --prog-fill: #8a7a6a;
      --item-border: #e0d8d0; --item-bg: #fff; --item-checked-bg: #f5efe8;
      --input-border: #e0d8d0; --input-focus: #8a7a6a; --input-bg: #fff;
      --no-date-text: #b0a090; --card-bg: #fffdf9; --card-border: #e0d8d0;
      --reset-btn: #8a7a6a; --day-bg: #fff; --day-hover: #f5efe8;
      --save-btn-bg: #3a3028; --save-btn-text: #fff;
      --toggle-on: #8a7a6a; --toggle-off: #e0d8d0; --toggle-knob: #fff;
    }

    .container { max-width: 720px; margin: 0 auto; position: relative; }
    .wrapper { position: relative; overflow: hidden; padding: .5rem 0; }

    .top-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
    .cat-switcher { display: flex; align-items: center; gap: 6px; padding: 5px 10px; background: var(--card-bg); border: 1px solid var(--panel-border); border-radius: 20px; }
    .cat-switcher span { font-size: 11px; color: var(--panel-muted); }
    .cat-btn { width: 30px; height: 30px; border-radius: 50%; border: 2px solid var(--panel-border); cursor: pointer; display: flex; align-items: center; justify-content: center; background: transparent; flex-shrink: 0; -webkit-tap-highlight-color: transparent; }
    .cat-btn.active { border-color: var(--accent); border-width: 2.5px; }
    .cat-btn:hover { border-color: var(--accent); }
    .top-action-btn { display: flex; align-items: center; gap: 5px; font-size: 12px; padding: 6px 12px; background: var(--card-bg); border: 1px solid var(--panel-border); border-radius: 20px; cursor: pointer; color: var(--panel-text); white-space: nowrap; -webkit-tap-highlight-color: transparent; }
    .top-action-btn:hover { background: var(--btn-hover-bg); color: var(--btn-hover-text); border-color: var(--btn-hover-bg); }
    .walk-toggle-wrap { display: flex; align-items: center; gap: 7px; padding: 5px 12px; background: var(--card-bg); border: 1px solid var(--panel-border); border-radius: 20px; }
    .walk-toggle-wrap span { font-size: 11px; color: var(--panel-muted); }
    .toggle-track { width: 34px; height: 20px; border-radius: 10px; background: var(--toggle-off); cursor: pointer; position: relative; transition: background .2s; flex-shrink: 0; border: none; padding: 0; -webkit-tap-highlight-color: transparent; }
    .toggle-track.on { background: var(--toggle-on); }
    .toggle-knob { width: 16px; height: 16px; border-radius: 50%; background: var(--toggle-knob); position: absolute; top: 2px; left: 2px; transition: left .2s; }
    .toggle-track.on .toggle-knob { left: 16px; }

    .app { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    @media (max-width: 520px) { .app { grid-template-columns: 1fr; } }

    .panel { background: var(--card-bg); border: 1.5px solid var(--panel-border); border-radius: 16px; padding: 1rem; }
    .right-panel { display: flex; flex-direction: column; gap: 10px; }
    .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .cal-month { font-size: 14px; font-weight: 500; color: var(--panel-text); display: flex; align-items: center; gap: 5px; }
    .cal-nav { display: flex; gap: 4px; }
    .cal-nav button { background: none; border: 1.5px solid var(--panel-border); border-radius: 50%; width: 28px; height: 28px; cursor: pointer; color: var(--panel-muted); font-size: 13px; display: flex; align-items: center; justify-content: center; -webkit-tap-highlight-color: transparent; }
    .cal-nav button:hover { background: var(--chip-pending-bg); }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
    .cal-day-name { text-align: center; font-size: 10px; color: var(--panel-muted); padding: 3px 0; font-weight: 500; }
    .cal-day { border-radius: 8px; cursor: pointer; overflow: hidden; border: 1px solid transparent; background: var(--day-bg); -webkit-tap-highlight-color: transparent; }
    .cal-day:hover { border-color: var(--panel-border); background: var(--day-hover); }
    .cal-day.selected { border: 2px solid var(--sel-border); }
    .cal-day.today .day-num-inner { background: var(--today-bg); color: var(--today-text); border-radius: 50%; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; }
    .cal-day.empty { cursor: default; background: transparent; }
    .cal-day.empty:hover { border-color: transparent; background: transparent; }
    .day-num { font-size: 11px; color: var(--panel-muted); padding: 3px 4px; line-height: 1.4; }
    .day-todos { display: flex; flex-direction: column; gap: 1px; padding: 0 2px 3px; }
    .todo-chip { font-size: 9px; padding: 1px 3px; border-radius: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; line-height: 1.5; }
    .todo-chip.done { background: var(--chip-done-bg); color: var(--chip-done-text); text-decoration: line-through; opacity: .8; }
    .todo-chip.pending { background: var(--chip-pending-bg); color: var(--chip-pending-text); }
    .more-count { font-size: 9px; color: var(--panel-muted); padding: 0 3px; }
    .legend { display: flex; gap: 10px; margin-top: 8px; justify-content: center; }
    .leg { display: flex; align-items: center; gap: 4px; font-size: 10px; color: var(--panel-muted); }
    .leg-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }

    .sub-card { background: var(--card-bg); border: 1.5px solid var(--card-border); border-radius: 12px; padding: .85rem .95rem; }
    .sec-title { font-size: 13px; font-weight: 500; color: var(--panel-text); display: flex; align-items: center; gap: 5px; }
    .sub-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 7px; }
    .date-lbl { font-size: 11px; color: var(--panel-muted); }
    .progress { display: flex; align-items: center; gap: 7px; margin-bottom: 7px; }
    .prog-bar { flex: 1; height: 3px; background: var(--prog-bg); border-radius: 3px; overflow: hidden; }
    .prog-fill { height: 100%; background: var(--prog-fill); border-radius: 3px; transition: width .3s; }
    .prog-text { font-size: 11px; color: var(--panel-muted); min-width: 28px; text-align: right; }
    .items-list { display: flex; flex-direction: column; gap: 4px; margin-bottom: 7px; max-height: 160px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .item-row { display: flex; align-items: center; gap: 6px; padding: 7px 8px; border-radius: 8px; border: 1px solid var(--item-border); background: var(--item-bg); }
    .item-row.checked { background: var(--item-checked-bg); opacity: .65; }
    .item-row input[type=checkbox] { width: 16px; height: 16px; cursor: pointer; flex-shrink: 0; accent-color: var(--accent); }
    .item-label { font-size: 12px; color: var(--panel-text); flex: 1; }
    .item-row.checked .item-label { text-decoration: line-through; color: var(--panel-muted); }
    .item-tag { font-size: 10px; padding: 2px 6px; border-radius: 7px; flex-shrink: 0; background: var(--tag-bg); color: var(--tag-text); }
    .item-del { background: none; border: none; cursor: pointer; color: var(--panel-muted); font-size: 16px; padding: 2px; opacity: .45; display: flex; align-items: center; -webkit-tap-highlight-color: transparent; }
    .item-del:hover { opacity: 1; color: #e05050; }
    .add-row { display: flex; gap: 5px; }
    .add-row input[type=text] { flex: 1; font-size: 13px; padding: 7px 10px; border: 1px solid var(--input-border); border-radius: 8px; background: var(--input-bg); color: var(--panel-text); outline: none; }
    .add-row input[type=text]:focus { border-color: var(--input-focus); }
    .add-btn { background: none; border: 1px solid var(--input-border); border-radius: 8px; padding: 7px 10px; font-size: 12px; cursor: pointer; color: var(--panel-text); display: flex; align-items: center; gap: 3px; white-space: nowrap; -webkit-tap-highlight-color: transparent; }
    .add-btn:hover { background: var(--btn-hover-bg); color: var(--btn-hover-text); border-color: var(--btn-hover-bg); }
    .reset-btn { font-size: 11px; background: none; border: none; cursor: pointer; color: var(--reset-btn); text-decoration: underline; -webkit-tap-highlight-color: transparent; }
    .no-date { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2.5rem 0; gap: 8px; color: var(--no-date-text); }
    .no-date p { font-size: 12px; }
    .divider { border: none; border-top: 1px solid var(--panel-border); margin: 8px 0; }
    .tmpl-lbl { font-size: 11px; color: var(--panel-muted); margin-bottom: 4px; }

    .modal-overlay { background: rgba(0,0,0,0.6); border-radius: 16px; display: flex; align-items: center; justify-content: center; padding: 16px; min-height: 300px; }
    .modal { background: var(--card-bg); border: 1.5px solid var(--panel-border); border-radius: 14px; padding: 1.2rem; width: 100%; }
    .modal-title { font-size: 14px; font-weight: 500; color: var(--panel-text); margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; }
    .modal-close { background: none; border: none; cursor: pointer; color: var(--panel-muted); font-size: 20px; line-height: 1; padding: 4px; -webkit-tap-highlight-color: transparent; }
    .modal-close:hover { color: var(--panel-text); }
    .tmpl-list { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; max-height: 200px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .tmpl-item-row { display: flex; align-items: center; gap: 6px; padding: 6px 8px; border-radius: 8px; border: 1px solid var(--item-border); background: var(--item-bg); }
    .tmpl-item-row input[type=text] { flex: 1; font-size: 13px; background: transparent; border: none; outline: none; color: var(--panel-text); padding: 2px 0; }
    .drag-handle { cursor: grab; color: var(--panel-muted); font-size: 14px; opacity: .5; }
    .modal-add-row { display: flex; gap: 5px; margin-bottom: 10px; }
    .modal-save-btn { width: 100%; padding: 10px; font-size: 14px; border-radius: 8px; border: none; background: var(--save-btn-bg); color: var(--save-btn-text); cursor: pointer; font-weight: 500; -webkit-tap-highlight-color: transparent; }
    .modal-save-btn:hover { opacity: .85; }

    .sp-back-btn { display: none; align-items: center; gap: 6px; font-size: 13px; padding: 7px 12px; background: var(--card-bg); border: 1px solid var(--panel-border); border-radius: 20px; cursor: pointer; color: var(--panel-text); margin-bottom: 10px; -webkit-tap-highlight-color: transparent; }
    @media (max-width: 520px) {
      .sp-back-btn { display: flex; }
      .top-action-btn .btn-label { display: none; }
      .walk-toggle-wrap .walk-label { display: none; }
      .cal-day { min-height: 42px; }
      .items-list { max-height: 200px; }
    }
    #walking-cat { position: absolute; pointer-events: none; z-index: 10; }
  </style>
</head>
<body>
<div class="container">
  <div class="wrapper" id="wrapper">
    <canvas id="walking-cat" width="70" height="55" style="position:absolute;top:0;left:-80px"></canvas>
    <div class="top-bar" id="top-bar">
      <div class="cat-switcher">
        <span>ねこ</span>
        <button class="cat-btn active" id="btn-black" aria-label="黒猫">
          <svg width="20" height="18" viewBox="0 0 20 18" fill="none"><ellipse cx="10" cy="12" rx="7" ry="5.5" fill="#111"/><polygon points="4,7 1.5,1 7,5.5" fill="#111"/><polygon points="16,7 18.5,1 13,5.5" fill="#111"/><ellipse cx="7.5" cy="10" rx="1.5" ry="2" fill="#5ee"/><ellipse cx="12.5" cy="10" rx="1.5" ry="2" fill="#5ee"/></svg>
        </button>
        <button class="cat-btn" id="btn-white" aria-label="白猫">
          <svg width="20" height="18" viewBox="0 0 20 18" fill="none"><ellipse cx="10" cy="12" rx="7" ry="5.5" fill="#fff" stroke="#ccc" stroke-width="1"/><polygon points="4,7 1.5,1 7,5.5" fill="#fff" stroke="#ccc" stroke-width="1"/><polygon points="16,7 18.5,1 13,5.5" fill="#fff" stroke="#ccc" stroke-width="1"/><ellipse cx="7.5" cy="10" rx="1.5" ry="2" fill="#555"/><ellipse cx="12.5" cy="10" rx="1.5" ry="2" fill="#555"/></svg>
        </button>
      </div>
      <button class="top-action-btn" id="open-tmpl" aria-label="テンプレート編集">
        <i class="ti ti-settings" aria-hidden="true"></i><span class="btn-label"> テンプレート編集</span>
      </button>
      <div class="walk-toggle-wrap">
        <span class="walk-label">歩く猫</span>
        <button class="toggle-track on" id="walk-toggle" aria-label="歩く猫のON/OFF" role="switch" aria-checked="true"><div class="toggle-knob"></div></button>
        <span id="walk-toggle-label" style="font-size:11px;font-weight:500;color:var(--panel-text);min-width:20px">ON</span>
      </div>
    </div>

    <div id="main-view">
      <div class="app" id="app-grid">
        <div class="panel" id="cal-panel">
          <div class="cal-header">
            <div class="cal-nav">
              <button id="prev" aria-label="前月"><i class="ti ti-chevron-left"></i></button>
              <button id="next" aria-label="翌月"><i class="ti ti-chevron-right"></i></button>
            </div>
            <span class="cal-month" id="month-label"></span>
          </div>
          <div class="cal-grid" id="cal-grid"></div>
          <div class="legend" style="margin-top:8px">
            <span class="leg"><span class="leg-dot" style="background:var(--chip-pending-bg);border:0.5px solid var(--panel-border)"></span>未完了</span>
            <span class="leg"><span class="leg-dot" style="background:var(--chip-done-bg);border:0.5px solid #3a7a5a"></span>完了済み</span>
          </div>
        </div>
        <div class="right-panel" id="right-panel">
          <div class="no-date"><canvas id="no-date-cat" width="60" height="52"></canvas><p>日付を選んでにゃ</p></div>
        </div>
      </div>
    </div>

    <div id="tmpl-modal-area" style="display:none">
      <div class="modal-overlay">
        <div class="modal">
          <div class="modal-title">
            <span>持ち物テンプレートを編集</span>
            <button class="modal-close" id="close-tmpl" aria-label="閉じる"><i class="ti ti-x"></i></button>
          </div>
          <div class="tmpl-list" id="tmpl-list"></div>
          <div class="modal-add-row">
            <input type="text" id="tmpl-new-input" placeholder="新しいアイテムを追加…" maxlength="30" style="flex:1;font-size:13px;padding:6px 8px;border:1px solid var(--input-border);border-radius:8px;background:var(--input-bg);color:var(--panel-text);outline:none">
            <button class="add-btn" id="tmpl-add-btn"><i class="ti ti-plus" aria-hidden="true"></i>追加</button>
          </div>
          <button class="modal-save-btn" id="save-tmpl">保存する</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  const CAT_FACES = ['(=^･ω･^=)', '(=^-ω-^=)', '( ^._.^)', '(=｀ω´=)', '(^･o･^)'];
  let DEFAULT_PACK = [
    { name: '財布' }, { name: 'スマートフォン' }, { name: '鍵' },
    { name: '交通系ICカード' }, { name: 'ハンカチ' }, { name: 'マスク' },
  ];
  const st = { year: 0, month: 0, sel: null, pack: {}, todo: {}, theme: 'black', walkEnabled: true };
  const td = new Date();
  st.year = td.getFullYear(); st.month = td.getMonth();

  const isSP = () => document.getElementById('wrapper').offsetWidth < 521;
  function dkey(y, m, d) { return `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`; }
  function getPack(k) { if (!st.pack[k]) st.pack[k] = DEFAULT_PACK.map(i => ({ name: i.name, checked: false, type: 'default' })); return st.pack[k]; }
  function getTodo(k) { if (!st.todo[k]) st.todo[k] = []; return st.todo[k]; }

  function catColors() {
    if (st.theme === 'black') return { body: '#111', inner: '#2a2a2a', innerEar: '#1e1e1e', eye: '#55eedd', eyeHL: '#88ffee', nose: '#ff7777', whisker: '#444', outline: null };
    return { body: '#fff', inner: '#f0ece8', innerEar: '#f5d5d5', eye: '#3a3028', eyeHL: '#aaa', nose: '#ffb3c1', whisker: '#ccc', outline: '#d0c8c0' };
  }

  function drawCat(ctx, x, y, scale, facing, frame) {
    const c = catColors();
    ctx.save(); ctx.translate(x, y); ctx.scale(facing === 'left' ? -scale : scale, scale);
    const lo = Math.sin(frame * .3) * 2.5, lo2 = Math.sin(frame * .3 + Math.PI) * 2.5;
    const str = () => { if (c.outline) { ctx.strokeStyle = c.outline; ctx.lineWidth = .7; ctx.stroke(); } };
    const fill = (col) => { ctx.fillStyle = col || c.body; ctx.fill(); str(); };
    ctx.beginPath(); ctx.ellipse(0, 8, 11, 8, 0, 0, Math.PI * 2); fill();
    ctx.beginPath(); ctx.ellipse(0, 0, 8, 7, 0, 0, Math.PI * 2); fill();
    ctx.beginPath(); ctx.moveTo(-7, -4); ctx.lineTo(-10, -14); ctx.lineTo(-2, -6); ctx.closePath(); fill();
    ctx.beginPath(); ctx.moveTo(7, -4); ctx.lineTo(10, -14); ctx.lineTo(2, -6); ctx.closePath(); fill();
    ctx.fillStyle = c.innerEar;
    ctx.beginPath(); ctx.moveTo(-6.5, -5.5); ctx.lineTo(-8.5, -12); ctx.lineTo(-3.5, -7); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(6.5, -5.5); ctx.lineTo(8.5, -12); ctx.lineTo(3.5, -7); ctx.closePath(); ctx.fill();
    ctx.fillStyle = c.inner; ctx.beginPath(); ctx.ellipse(0, 10, 5, 4, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = c.eye;
    ctx.beginPath(); ctx.ellipse(-3.5, -1, 2.2, 2.8, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(3.5, -1, 2.2, 2.8, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = c.eyeHL;
    ctx.beginPath(); ctx.ellipse(-2.7, -1.6, .9, 1.3, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(4.3, -1.6, .9, 1.3, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = c.nose; ctx.beginPath(); ctx.ellipse(0, 2.2, 1.2, .8, 0, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = c.whisker; ctx.lineWidth = .6;
    [[-10, 1], [-10, 2.5], [-10, 4]].forEach(([wx, wy]) => { ctx.beginPath(); ctx.moveTo(-2, 2.5); ctx.lineTo(wx, wy); ctx.stroke(); });
    [[10, 1], [10, 2.5], [10, 4]].forEach(([wx, wy]) => { ctx.beginPath(); ctx.moveTo(2, 2.5); ctx.lineTo(wx, wy); ctx.stroke(); });
    ctx.fillStyle = c.body;
    [[-5, 12 + lo], [-2, 12 + lo2], [2, 12 + lo], [5, 12 + lo2]].forEach(([lx, ly]) => {
      ctx.beginPath(); ctx.ellipse(lx, ly, 2, 4, 0, 0, Math.PI * 2); ctx.fill();
      if (c.outline) { ctx.strokeStyle = c.outline; ctx.lineWidth = .7; ctx.stroke(); }
    });
    ctx.beginPath(); ctx.moveTo(11, 6); ctx.quadraticCurveTo(13, 8, 13, 16); ctx.quadraticCurveTo(13, 20, 8, 19);
    ctx.lineWidth = 3; ctx.strokeStyle = c.body; ctx.stroke();
    if (c.outline) { ctx.lineWidth = 1; ctx.strokeStyle = c.outline; ctx.stroke(); }
    ctx.restore();
  }

  function drawStaticCat(id) {
    const cv = document.getElementById(id); if (!cv) return;
    const ctx = cv.getContext('2d'); ctx.clearRect(0, 0, cv.width, cv.height);
    drawCat(ctx, 30, 28, 1.6, 'right', 0);
  }

  let walkAnim = null, walkTimer = null;
  function clearWalkTimer() { if (walkTimer) { clearTimeout(walkTimer); walkTimer = null; } }
  function stopWalk() {
    clearWalkTimer(); if (walkAnim) { cancelAnimationFrame(walkAnim); walkAnim = null; }
    const cv = document.getElementById('walking-cat');
    if (cv) { const ctx = cv.getContext('2d'); ctx.clearRect(0, 0, cv.width, cv.height); cv.style.left = '-80px'; }
  }
  function scheduleNextWalk() { if (!st.walkEnabled) return; walkTimer = setTimeout(doWalk, 8000 + Math.random() * 12000); }
  function doWalk() {
    if (!st.walkEnabled) return;
    const wr = document.getElementById('wrapper'); if (!wr) return;
    const W = wr.offsetWidth || 380, H = wr.offsetHeight || 400;
    const dir = Math.random() > .5 ? 1 : -1;
    let wx = dir === 1 ? -70 : W + 10;
    const wy = 15 + Math.random() * (Math.max(H - 80, 60));
    const cv = document.getElementById('walking-cat'); if (!cv) return;
    cv.style.top = wy + 'px'; let frame = 0;
    function step() {
      if (!st.walkEnabled) { walkAnim = null; return; }
      wx += 1.5 * dir; frame++;
      cv.style.left = (wx - 35) + 'px';
      const ctx = cv.getContext('2d'); ctx.clearRect(0, 0, cv.width, cv.height);
      drawCat(ctx, 35, 28, 1.5, dir === 1 ? 'right' : 'left', frame);
      const done = (dir === 1 && wx > W + 70) || (dir === -1 && wx < -70);
      if (!done) walkAnim = requestAnimationFrame(step);
      else { walkAnim = null; scheduleNextWalk(); }
    }
    walkAnim = requestAnimationFrame(step);
  }

  function setWalkEnabled(on) {
    st.walkEnabled = on;
    const track = document.getElementById('walk-toggle');
    const lbl = document.getElementById('walk-toggle-label');
    if (on) { track.classList.add('on'); track.setAttribute('aria-checked', 'true'); lbl.textContent = 'ON'; scheduleNextWalk(); }
    else { track.classList.remove('on'); track.setAttribute('aria-checked', 'false'); lbl.textContent = 'OFF'; stopWalk(); }
  }
  document.getElementById('walk-toggle').addEventListener('click', () => setWalkEnabled(!st.walkEnabled));

  function applyTheme(el) { if (!el) return; if (st.theme === 'white') el.classList.add('theme-white'); else el.classList.remove('theme-white'); }
  function setTheme(t) {
    st.theme = t;
    document.body.className = t === 'white' ? 'theme-white' : '';
    ['main-view', 'wrapper', 'tmpl-modal-area', 'top-bar'].forEach(id => applyTheme(document.getElementById(id)));
    document.getElementById('btn-black').classList.toggle('active', t === 'black');
    document.getElementById('btn-white').classList.toggle('active', t === 'white');
    drawStaticCat('no-date-cat');
    if (walkAnim) { cancelAnimationFrame(walkAnim); walkAnim = null; }
    if (st.walkEnabled) scheduleNextWalk();
  }
  document.getElementById('btn-black').addEventListener('click', () => setTheme('black'));
  document.getElementById('btn-white').addEventListener('click', () => setTheme('white'));

  function showSpDetail() {
    document.getElementById('cal-panel').style.display = 'none';
    const rp = document.getElementById('right-panel');
    let back = document.getElementById('sp-back');
    if (!back) {
      back = document.createElement('button'); back.id = 'sp-back'; back.className = 'sp-back-btn';
      back.innerHTML = '<i class="ti ti-chevron-left"></i> カレンダーに戻る';
      back.addEventListener('click', () => { st.sel = null; document.getElementById('cal-panel').style.display = ''; back.style.display = 'none'; renderRight(); renderCal(); });
      rp.parentNode.insertBefore(back, rp);
    }
    back.style.display = 'flex';
  }
  function hideSpDetail() {
    document.getElementById('cal-panel').style.display = '';
    const back = document.getElementById('sp-back'); if (back) back.style.display = 'none';
  }

  function renderCal() {
    const y = st.year, m = st.month;
    const mn = ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'];
    document.getElementById('month-label').innerHTML = `<span style="font-size:11px;opacity:.45">${CAT_FACES[m % 5]}</span> ${y}年 ${mn[m]}`;
    const g = document.getElementById('cal-grid'); g.innerHTML = '';
    ['日', '月', '火', '水', '木', '金', '土'].forEach(n => { const e = document.createElement('div'); e.className = 'cal-day-name'; e.textContent = n; g.appendChild(e); });
    const first = new Date(y, m, 1).getDay(), days = new Date(y, m + 1, 0).getDate();
    for (let i = 0; i < first; i++) { const e = document.createElement('div'); e.className = 'cal-day empty'; g.appendChild(e); }
    for (let d = 1; d <= days; d++) {
      const k = dkey(y, m, d);
      const el = document.createElement('div'); el.className = 'cal-day';
      const isToday = d === td.getDate() && m === td.getMonth() && y === td.getFullYear();
      if (isToday) el.classList.add('today');
      if (st.sel === k) el.classList.add('selected');
      const numDiv = document.createElement('div'); numDiv.className = 'day-num';
      if (isToday) { const s = document.createElement('span'); s.className = 'day-num-inner'; s.textContent = d; numDiv.appendChild(s); }
      else numDiv.textContent = d;
      el.appendChild(numDiv);
      const todos = st.todo[k] || [];
      if (todos.length > 0) {
        const tc = document.createElement('div'); tc.className = 'day-todos';
        const maxChips = isSP() ? 2 : 3;
        todos.slice(0, maxChips).forEach(item => {
          const chip = document.createElement('div'); chip.className = 'todo-chip ' + (item.checked ? 'done' : 'pending'); chip.textContent = item.name; chip.title = item.name; tc.appendChild(chip);
        });
        if (todos.length > maxChips) { const more = document.createElement('div'); more.className = 'more-count'; more.textContent = `+${todos.length - maxChips}件`; tc.appendChild(more); }
        el.appendChild(tc);
      }
      el.addEventListener('click', () => { st.sel = k; renderCal(); if (isSP()) showSpDetail(); renderRight(); });
      g.appendChild(el);
    }
  }

  function pawSvg() {
    const c = st.theme === 'black' ? '#555' : '#c0a898';
    return `<svg width="10" height="10" viewBox="0 0 12 12" fill="${c}" aria-hidden="true"><ellipse cx="6" cy="8" rx="4" ry="3"/><ellipse cx="2.5" cy="4" rx="1.5" ry="1.8"/><ellipse cx="5" cy="3" rx="1.5" ry="1.8"/><ellipse cx="7.5" cy="3" rx="1.5" ry="1.8"/><ellipse cx="9.5" cy="4" rx="1.5" ry="1.8"/></svg>`;
  }

  function renderRight() {
    const rp = document.getElementById('right-panel');
    if (!st.sel) {
      if (isSP()) hideSpDetail();
      rp.innerHTML = `<div class="no-date"><canvas id="no-date-cat" width="60" height="52"></canvas><p>日付を選んでにゃ</p></div>`;
      drawStaticCat('no-date-cat'); return;
    }
    const [y, mo, d] = st.sel.split('-');
    const dateStr = `${parseInt(y)}年${parseInt(mo)}月${parseInt(d)}日`;
    const packItems = getPack(st.sel), todoItems = getTodo(st.sel);
    const pd = packItems.filter(i => i.checked).length, td2 = todoItems.filter(i => i.checked).length;
    rp.innerHTML = `
      <div class="sub-card">
        <div class="sub-header"><div class="sec-title">${pawSvg()}&nbsp;持ち物リスト</div><span class="date-lbl">${dateStr}</span></div>
        <div class="progress"><div class="prog-bar"><div class="prog-fill" id="pf-pack" style="width:${packItems.length ? Math.round(pd / packItems.length * 100) : 0}%"></div></div><span class="prog-text" id="pt-pack">${pd}/${packItems.length}</span></div>
        <div class="tmpl-lbl">テンプレート <button class="reset-btn" id="pack-reset">リセット</button></div>
        <div class="items-list" id="pack-list"></div>
        <hr class="divider">
        <div class="add-row"><input type="text" id="pack-input" placeholder="持ち物を追加…" maxlength="30"><button class="add-btn" id="pack-add"><i class="ti ti-plus" aria-hidden="true"></i>追加</button></div>
      </div>
      <div class="sub-card">
        <div class="sub-header"><div class="sec-title">${pawSvg()}&nbsp;やることリスト</div><span style="font-size:11px;color:var(--panel-muted)">${CAT_FACES[parseInt(d) % 5]}</span></div>
        <div class="progress"><div class="prog-bar"><div class="prog-fill" id="pf-todo" style="width:${todoItems.length ? Math.round(td2 / todoItems.length * 100) : 0}%"></div></div><span class="prog-text" id="pt-todo">${td2}/${todoItems.length}</span></div>
        <div class="items-list" id="todo-list"></div>
        <hr class="divider">
        <div class="add-row"><input type="text" id="todo-input" placeholder="やることを追加にゃ…" maxlength="40"><button class="add-btn" id="todo-add"><i class="ti ti-plus" aria-hidden="true"></i>追加</button></div>
      </div>
    `;
    const pl = document.getElementById('pack-list');
    packItems.forEach((item, i) => {
      const row = document.createElement('div'); row.className = 'item-row' + (item.checked ? ' checked' : '');
      row.innerHTML = `<input type="checkbox" ${item.checked ? 'checked' : ''} aria-label="${item.name}"><span class="item-label">${item.name}</span><span class="item-tag">${item.type === 'default' ? '基本' : '追加'}</span><button class="item-del" aria-label="削除"><i class="ti ti-x"></i></button>`;
      row.querySelector('input').addEventListener('change', e => { packItems[i].checked = e.target.checked; renderCal(); updateProgress(); });
      row.querySelector('.item-del').addEventListener('click', () => { packItems.splice(i, 1); renderCal(); renderRight(); });
      pl.appendChild(row);
    });
    const tl = document.getElementById('todo-list');
    todoItems.forEach((item, i) => {
      const row = document.createElement('div'); row.className = 'item-row' + (item.checked ? ' checked' : '');
      row.innerHTML = `<input type="checkbox" ${item.checked ? 'checked' : ''} aria-label="${item.name}"><span class="item-label">${item.name}</span><span class="item-tag">ToDo</span><button class="item-del" aria-label="削除"><i class="ti ti-x"></i></button>`;
      row.querySelector('input').addEventListener('change', e => { todoItems[i].checked = e.target.checked; renderCal(); updateProgress(); });
      row.querySelector('.item-del').addEventListener('click', () => { todoItems.splice(i, 1); renderCal(); renderRight(); });
      tl.appendChild(row);
    });
    document.getElementById('pack-reset').addEventListener('click', () => { st.pack[st.sel] = DEFAULT_PACK.map(i => ({ name: i.name, checked: false, type: 'default' })); renderCal(); renderRight(); });
    const pi = document.getElementById('pack-input'), pa = document.getElementById('pack-add');
    const doAddPack = () => { const v = pi.value.trim(); if (!v) return; packItems.push({ name: v, checked: false, type: 'custom' }); pi.value = ''; renderCal(); renderRight(); };
    pa.addEventListener('click', doAddPack); pi.addEventListener('keydown', e => { if (e.key === 'Enter') doAddPack(); });
    const ti2 = document.getElementById('todo-input'), ta = document.getElementById('todo-add');
    const doAddTodo = () => { const v = ti2.value.trim(); if (!v) return; todoItems.push({ name: v, checked: false, type: 'custom' }); ti2.value = ''; renderCal(); renderRight(); };
    ta.addEventListener('click', doAddTodo); ti2.addEventListener('keydown', e => { if (e.key === 'Enter') doAddTodo(); });
  }

  function updateProgress() {
    if (!st.sel) return;
    const p = getPack(st.sel), t = getTodo(st.sel);
    const pd = p.filter(i => i.checked).length, td2 = t.filter(i => i.checked).length;
    const pf = document.getElementById('pf-pack'); if (pf) pf.style.width = (p.length ? Math.round(pd / p.length * 100) : 0) + '%';
    const tf = document.getElementById('pf-todo'); if (tf) tf.style.width = (t.length ? Math.round(td2 / t.length * 100) : 0) + '%';
    const pp = document.getElementById('pt-pack'); if (pp) pp.textContent = `${pd}/${p.length}`;
    const tp = document.getElementById('pt-todo'); if (tp) tp.textContent = `${td2}/${t.length}`;
  }

  let editingTemplate = [];
  function openTemplateModal() {
    editingTemplate = DEFAULT_PACK.map(i => ({ name: i.name }));
    renderTmplList();
    document.getElementById('tmpl-modal-area').style.display = 'block';
    document.getElementById('main-view').style.display = 'none';
    applyTheme(document.getElementById('tmpl-modal-area'));
  }
  function closeTemplateModal() {
    document.getElementById('tmpl-modal-area').style.display = 'none';
    document.getElementById('main-view').style.display = 'block';
  }
  function renderTmplList() {
    const list = document.getElementById('tmpl-list'); list.innerHTML = '';
    editingTemplate.forEach((item, i) => {
      const row = document.createElement('div'); row.className = 'tmpl-item-row';
      row.innerHTML = `<span class="drag-handle"><i class="ti ti-grip-vertical"></i></span><input type="text" value="${item.name}" maxlength="30" aria-label="アイテム名"><button class="item-del" aria-label="削除"><i class="ti ti-x"></i></button>`;
      row.querySelector('input').addEventListener('input', e => { editingTemplate[i].name = e.target.value; });
      row.querySelector('.item-del').addEventListener('click', () => { editingTemplate.splice(i, 1); renderTmplList(); });
      list.appendChild(row);
    });
  }
  document.getElementById('open-tmpl').addEventListener('click', openTemplateModal);
  document.getElementById('close-tmpl').addEventListener('click', closeTemplateModal);
  document.getElementById('tmpl-add-btn').addEventListener('click', () => {
    const inp = document.getElementById('tmpl-new-input');
    const v = inp.value.trim(); if (!v) return;
    editingTemplate.push({ name: v }); inp.value = ''; renderTmplList();
  });
  document.getElementById('tmpl-new-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') { const v = e.target.value.trim(); if (!v) return; editingTemplate.push({ name: v }); e.target.value = ''; renderTmplList(); }
  });
  document.getElementById('save-tmpl').addEventListener('click', () => {
    DEFAULT_PACK = editingTemplate.filter(i => i.name.trim()).map(i => ({ name: i.name.trim() }));
    closeTemplateModal(); renderRight();
  });
  document.getElementById('prev').addEventListener('click', () => { st.month--; if (st.month < 0) { st.month = 11; st.year--; } renderCal(); });
  document.getElementById('next').addEventListener('click', () => { st.month++; if (st.month > 11) { st.month = 0; st.year++; } renderCal(); });

  function saveToStorage() {
    try {
      localStorage.setItem('neko_pack', JSON.stringify(st.pack));
      localStorage.setItem('neko_todo', JSON.stringify(st.todo));
      localStorage.setItem('neko_template', JSON.stringify(DEFAULT_PACK));
      localStorage.setItem('neko_theme', st.theme);
      localStorage.setItem('neko_walk', st.walkEnabled ? '1' : '0');
    } catch(e) {}
  }

  function loadFromStorage() {
    try {
      const pack = localStorage.getItem('neko_pack');
      const todo = localStorage.getItem('neko_todo');
      const tmpl = localStorage.getItem('neko_template');
      const theme = localStorage.getItem('neko_theme');
      const walk = localStorage.getItem('neko_walk');
      if (pack) st.pack = JSON.parse(pack);
      if (todo) st.todo = JSON.parse(todo);
      if (tmpl) DEFAULT_PACK = JSON.parse(tmpl);
      if (theme) st.theme = theme;
      if (walk !== null) st.walkEnabled = walk === '1';
    } catch(e) {}
  }

  const _origRenderRight = renderRight;
  const _origSaveTmpl = document.getElementById('save-tmpl');

  function autoSave() { saveToStorage(); }

  document.querySelectorAll('.items-list').forEach(el => el.addEventListener('change', autoSave));
  const observer = new MutationObserver(() => saveToStorage());
  observer.observe(document.getElementById('right-panel'), { childList: true, subtree: true });

  _origSaveTmpl.addEventListener('click', () => { setTimeout(saveToStorage, 50); });

  document.getElementById('btn-black').addEventListener('click', saveToStorage);
  document.getElementById('btn-white').addEventListener('click', saveToStorage);
  document.getElementById('walk-toggle').addEventListener('click', saveToStorage);

  loadFromStorage();
  if (st.theme === 'white') {
    document.body.className = 'theme-white';
    ['main-view', 'wrapper', 'tmpl-modal-area', 'top-bar'].forEach(id => applyTheme(document.getElementById(id)));
    document.getElementById('btn-black').classList.remove('active');
    document.getElementById('btn-white').classList.add('active');
  }
  if (!st.walkEnabled) {
    const track = document.getElementById('walk-toggle');
    track.classList.remove('on');
    track.setAttribute('aria-checked', 'false');
    document.getElementById('walk-toggle-label').textContent = 'OFF';
  }

  renderCal(); renderRight(); drawStaticCat('no-date-cat');
  if (st.walkEnabled) scheduleNextWalk();
</script>
</body>
</html>
